<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HFGM Ministry</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#0a1a22, #0f2b36);
  color: white;
  text-align: center;
}

/* HERO */
.hero {
  padding: 40px 20px;
}

.hero h1 {
  color: gold;
  text-shadow: 0 0 15px yellow;
}

.profile {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  border: 5px solid gold;
  box-shadow: 0 0 20px gold;
  margin: 20px auto;
}

/* BUTTONS */
.btn {
  padding: 10px 20px;
  border-radius: 20px;
  margin: 5px;
  border: none;
  color: white;
  cursor: pointer;
}

.whatsapp { background: green; }
.youtube { background: red; }
.support { background: limegreen; }

/* CARDS */
.section {
  background: white;
  color: black;
  margin: 20px;
  padding: 20px;
  border-radius: 15px;
}

.cards {
  display: flex;
  overflow-x: auto;
}

.card {
  min-width: 200px;
  margin: 10px;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

/* FORM */
input, textarea {
  width: 90%;
  padding: 10px;
  margin: 5px;
}
</style>

</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>Holy Spirit Fellowship Global Ministry</h1>
  <p>A Place of Prayer • Healing • Deliverance</p>

  <img src="your-photo.jpg" class="profile">

  <h3>Preacher: Bro. Pendyala Suresh</h3>
  <p>📍 Tadepalligudem</p>
  <p>📞 +91 8341023058</p>

  <button class="btn whatsapp">WhatsApp</button>
  <button class="btn youtube">YouTube</button>
  <button class="btn support">Support</button>
</div>

<!-- SLIDES -->
<div class="section">
  <h2>Our Ministry Work</h2>

  <div class="cards" id="slider">
    <div class="card"><img src="cover.jpg"></div>
    <div class="card"><img src="cover.jpg"></div>
    <div class="card"><img src="cover.jpg"></div>
  </div>
</div>

<!-- SERVICES -->
<div class="section">
  <h2>Our Services</h2>
  <p>🙏 Prayer | 🔥 Healing | 🍞 Food | 🏠 Orphans Care</p>
</div>

<!-- YOUTUBE -->
<div class="section">
  <h2>YouTube</h2>

  <iframe width="100%" height="200"
    src="https://www.youtube.com/embed/e0BdlIK9bUA"
    frameborder="0" allowfullscreen>
  </iframe>
</div>

<!-- PRAYER FORM -->
<div class="section">
  <h2>Prayer Request</h2>

  <input id="name" placeholder="Your Name">
  <input id="phone" placeholder="Phone">
  <textarea id="prayer" placeholder="Prayer Request"></textarea>

  <button onclick="submitPrayer()">Submit</button>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBlyi5hI-jSSyIf-H9rnpP_4Ldj6Cfpqu8",
  authDomain: "hfgm-ministry.firebaseapp.com",
  projectId: "hfgm-ministry",
  storageBucket: "hfgm-ministry.firebasestorage.app",
  messagingSenderId: "1079389581104",
  appId: "1:1079389581104:web:3086069ef3d1a09c7fe2f5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.submitPrayer = async function () {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let prayer = document.getElementById("prayer").value;

  if (!name || !phone || !prayer) {
    alert("Fill all fields");
    return;
  }

  await addDoc(collection(db, "prayers"), {
    name, phone, prayer
  });

  alert("Submitted 🙏");
};
</script>

<!-- AUTO SLIDE -->
<script>
let slider = document.getElementById("slider");

setInterval(() => {
  slider.scrollLeft += 200;
}, 2000);
</script>

</body>
</html>
