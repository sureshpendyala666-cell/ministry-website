<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HFGM Ministry</title>

<style>
body{
font-family:Arial;
background:#071c24;
color:white;
text-align:center;
}

.section{
background:white;
color:black;
margin:20px;
padding:20px;
border-radius:15px;
}

input,textarea{
width:90%;
padding:10px;
margin:8px;
border-radius:10px;
}

button{
padding:12px;
background:#0b4da2;
color:white;
border:none;
border-radius:20px;
}
</style>
</head>

<body>

<h1>🙏 Prayer Request</h1>

<div class="section">

<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">
<textarea id="message" placeholder="Your Prayer"></textarea>

<button onclick="sendData()">Submit Prayer</button>

<p id="status"></p>

</div>

<!-- Firebase SDK -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔴 మీ Firebase config ఇక్కడ paste చేయాలి */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "123456",
  appId: "APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.sendData = async function(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let message = document.getElementById("message").value;

try{

await addDoc(collection(db, "prayers"), {
  name: name,
  phone: phone,
  message: message,
  time: new Date()
});

document.getElementById("status").innerHTML = "✅ Saved & Prayer received";

let text="Prayer Request%0AName:"+name+"%0APhone:"+phone+"%0AMessage:"+message;
window.open("https://wa.me/918341023058?text="+text);

}catch(e){
document.getElementById("status").innerHTML = "❌ Error saving data";
}

}

</script>

</body>
</html>
