<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HFGM Ministry</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(#0a1a22,#0f2b36);
color:white;
text-align:center;
}

/* HERO */
.hero{
padding:40px 20px;
}

.hero h1{
color:gold;
text-shadow:0 0 20px yellow;
}

.profile{
width:150px;
height:150px;
border-radius:50%;
border:5px solid gold;
box-shadow:0 0 30px gold;
margin:20px auto;
object-fit:cover;
}

/* BUTTONS */
.btn{
padding:10px 20px;
border-radius:25px;
margin:5px;
border:none;
color:white;
font-weight:bold;
cursor:pointer;
}

.whatsapp{background:#25D366;}
.youtube{background:#FF0000;}
.support{background:#28a745;}

/* SECTION */
.section{
background:white;
color:black;
margin:20px;
padding:20px;
border-radius:20px;
box-shadow:0 0 10px #ccc;
}

/* SLIDER */
.slider{
display:flex;
overflow:hidden;
}

.slide{
min-width:100%;
transition:0.5s;
}

.slide img{
width:100%;
border-radius:15px;
}

/* FORM */
input,textarea{
width:95%;
padding:12px;
margin:5px;
border-radius:10px;
border:1px solid #ccc;
}

button.submit{
background:#007bff;
color:white;
padding:10px 20px;
border:none;
border-radius:20px;
}

/* MOBILE */
@media(max-width:600px){
.hero h1{font-size:22px;}
}
</style>

</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>Holy Spirit Fellowship Global Ministry</h1>
<p>A Place of Prayer • Healing • Deliverance</p>

<img src="your-photo.jpg" class="profile">

<h3>Preacher: Bro. Pendyala Suresh</h3>
<p>📍 Tadepalligudem</p>
<p>📞 +91 8341023058</p>

<button class="btn whatsapp">WhatsApp</button>
<button class="btn youtube">YouTube</button>
<button class="btn support">Support</button>
</div>

<!-- SLIDER -->
<div class="section">
<h2>Our Ministry Work</h2>

<div class="slider" id="slider">
<div class="slide"><img src="cover.jpg"></div>
<div class="slide"><img src="cover.jpg"></div>
<div class="slide"><img src="cover.jpg"></div>
</div>
</div>

<!-- SERVICES -->
<div class="section">
<h2>Our Services</h2>
<p>🙏 Prayer | 🔥 Healing | 🍞 Food | 🏠 Orphans Care</p>
</div>

<!-- YOUTUBE -->
<div class="section">
<h2>YouTube</h2>
<iframe width="100%" height="220"
src="https://www.youtube.com/embed/e0BdlIK9bUA"
frameborder="0" allowfullscreen></iframe>
</div>

<!-- PRAYER -->
<div class="section">
<h2>Prayer Request</h2>

<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone">
<textarea id="prayer" placeholder="Prayer Request"></textarea>

<button class="submit" onclick="submitPrayer()">Submit Prayer</button>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBlyi5hI-jSSyIf-H9rnpP_4Ldj6Cfpqu8",
authDomain: "hfgm-ministry.firebaseapp.com",
projectId: "hfgm-ministry",
storageBucket: "hfgm-ministry.firebasestorage.app",
messagingSenderId: "1079389581104",
appId: "1:1079389581104:web:3086069ef3d1a09c7fe2f5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.submitPrayer = async function(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let prayer=document.getElementById("prayer").value;

if(!name || !phone || !prayer){
alert("Fill all fields");
return;
}

await addDoc(collection(db,"prayers"),{name,phone,prayer});
alert("Prayer Submitted 🙏");
}
</script>

<!-- AUTO SLIDER -->
<script>
let index=0;
let slides=document.querySelectorAll(".slide");

setInterval(()=>{
index++;
if(index>=slides.length) index=0;

document.getElementById("slider").style.transform=
translateX(-${index*100}%);

},3000);
</script>

</body>
</html>
